<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f3eee4" />
    <meta
      name="description"
      content="分岔 — 自定义世界设定，AI 推演世界线，结构化状态与事件日志可追溯。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>分岔 · 通用世界推演</title>
    <style>
      /* 首屏兜底：JS 未跑起来时也能看见说明，避免「只有网格」 */
      #boot-fallback {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        max-width: 28rem;
        margin: 4rem auto;
        padding: 1.5rem;
        color: #1a1714;
        background: #fff;
        border: 2px solid #1a1714;
        line-height: 1.6;
      }
      #boot-fallback h1 {
        font-size: 1.25rem;
        margin: 0 0 0.75rem;
      }
      #boot-fallback p {
        margin: 0 0 0.5rem;
      }
      #boot-fallback code {
        font-family: ui-monospace, monospace;
        background: #f3eee4;
        padding: 0.1em 0.35em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback">
        <h1>分岔 · 正在加载</h1>
        <p>若超过几秒仍停在此页，请强制刷新（Ctrl+Shift+R）。</p>
        <p>正确地址：<code>http://127.0.0.1:5180/</code></p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
